<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <meta name="description" content="A sleek, modern glassmorphic Tic Tac Toe game built using 100% Pure HTML and CSS with zero JavaScript.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Floating ambient globes -->
  <div class="background-globes">
    <div class="globe globe-1"></div>
    <div class="globe globe-2"></div>
    <div class="globe globe-3"></div>
  </div>

  <form class="game-form">
    <main class="game-container">
      <header class="game-header">
        <h1 class="game-title">TIC TAC <span class="accent-text">TOE</span></h1>
        <span class="badge-pure-css">100% Pure CSS</span>
      </header>

      <!-- Hidden Radio Inputs for 9 cells (X and O for each cell) -->
      <!-- Cell 1 -->
      <input type="radio" id="x1" name="c1" class="input-x cell-1-x">
      <input type="radio" id="o1" name="c1" class="input-o cell-1-o">

      <!-- Cell 2 -->
      <input type="radio" id="x2" name="c2" class="input-x cell-2-x">
      <input type="radio" id="o2" name="c2" class="input-o cell-2-o">

      <!-- Cell 3 -->
      <input type="radio" id="x3" name="c3" class="input-x cell-3-x">
      <input type="radio" id="o3" name="c3" class="input-o cell-3-o">

      <!-- Cell 4 -->
      <input type="radio" id="x4" name="c4" class="input-x cell-4-x">
      <input type="radio" id="o4" name="c4" class="input-o cell-4-o">

      <!-- Cell 5 -->
      <input type="radio" id="x5" name="c5" class="input-x cell-5-x">
      <input type="radio" id="o5" name="c5" class="input-o cell-5-o">

      <!-- Cell 6 -->
      <input type="radio" id="x6" name="c6" class="input-x cell-6-x">
      <input type="radio" id="o6" name="c6" class="input-o cell-6-o">

      <!-- Cell 7 -->
      <input type="radio" id="x7" name="c7" class="input-x cell-7-x">
      <input type="radio" id="o7" name="c7" class="input-o cell-7-o">

      <!-- Cell 8 -->
      <input type="radio" id="x8" name="c8" class="input-x cell-8-x">
      <input type="radio" id="o8" name="c8" class="input-o cell-8-o">

      <!-- Cell 9 -->
      <input type="radio" id="x9" name="c9" class="input-x cell-9-x">
      <input type="radio" id="o9" name="c9" class="input-o cell-9-o">

      <!-- Status Banner -->
      <div class="status-banner">
        <span class="status-text turn-x-text">Player X's Turn (Cyan)</span>
        <span class="status-text turn-o-text">Player O's Turn (Red)</span>
        <span class="status-text win-x-text">Player X Wins! 🎉</span>
        <span class="status-text win-o-text">Player O Wins! 🎉</span>
        <span class="status-text tie-text">It's a Tie! 🤝</span>
      </div>

      <!-- 3x3 Board Grid -->
      <div class="board-wrapper">
        <div class="board">
          <!-- Cell 1 -->
          <div class="cell cell-1">
            <label for="x1" class="lbl-x" title="Play X"></label>
            <label for="o1" class="lbl-o" title="Play O"></label>
            <div class="symbol symbol-x">
              <svg viewBox="0 0 100 100"><path d="M 20 20 L 80 80 M 80 20 L 20 80" /></svg>
            </div>
            <div class="symbol symbol-o">
              <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="32" /></svg>
            </div>
          </div>

          <!-- Cell 2 -->
          <div class="cell cell-2">
            <label for="x2" class="lbl-x" title="Play X"></label>
            <label for="o2" class="lbl-o" title="Play O"></label>
            <div class="symbol symbol-x">
              <svg viewBox="0 0 100 100"><path d="M 20 20 L 80 80 M 80 20 L 20 80" /></svg>
            </div>
            <div class="symbol symbol-o">
              <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="32" /></svg>
            </div>
          </div>

          <!-- Cell 3 -->
          <div class="cell cell-3">
            <label for="x3" class="lbl-x" title="Play X"></label>
            <label for="o3" class="lbl-o" title="Play O"></label>
            <div class="symbol symbol-x">
              <svg viewBox="0 0 100 100"><path d="M 20 20 L 80 80 M 80 20 L 20 80" /></svg>
            </div>
            <div class="symbol symbol-o">
              <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="32" /></svg>
            </div>
          </div>

          <!-- Cell 4 -->
          <div class="cell cell-4">
            <label for="x4" class="lbl-x" title="Play X"></label>
            <label for="o4" class="lbl-o" title="Play O"></label>
            <div class="symbol symbol-x">
              <svg viewBox="0 0 100 100"><path d="M 20 20 L 80 80 M 80 20 L 20 80" /></svg>
            </div>
            <div class="symbol symbol-o">
              <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="32" /></svg>
            </div>
          </div>

          <!-- Cell 5 -->
          <div class="cell cell-5">
            <label for="x5" class="lbl-x" title="Play X"></label>
            <label for="o5" class="lbl-o" title="Play O"></label>
            <div class="symbol symbol-x">
              <svg viewBox="0 0 100 100"><path d="M 20 20 L 80 80 M 80 20 L 20 80" /></svg>
            </div>
            <div class="symbol symbol-o">
              <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="32" /></svg>
            </div>
          </div>

          <!-- Cell 6 -->
          <div class="cell cell-6">
            <label for="x6" class="lbl-x" title="Play X"></label>
            <label for="o6" class="lbl-o" title="Play O"></label>
            <div class="symbol symbol-x">
              <svg viewBox="0 0 100 100"><path d="M 20 20 L 80 80 M 80 20 L 20 80" /></svg>
            </div>
            <div class="symbol symbol-o">
              <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="32" /></svg>
            </div>
          </div>

          <!-- Cell 7 -->
          <div class="cell cell-7">
            <label for="x7" class="lbl-x" title="Play X"></label>
            <label for="o7" class="lbl-o" title="Play O"></label>
            <div class="symbol symbol-x">
              <svg viewBox="0 0 100 100"><path d="M 20 20 L 80 80 M 80 20 L 20 80" /></svg>
            </div>
            <div class="symbol symbol-o">
              <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="32" /></svg>
            </div>
          </div>

          <!-- Cell 8 -->
          <div class="cell cell-8">
            <label for="x8" class="lbl-x" title="Play X"></label>
            <label for="o8" class="lbl-o" title="Play O"></label>
            <div class="symbol symbol-x">
              <svg viewBox="0 0 100 100"><path d="M 20 20 L 80 80 M 80 20 L 20 80" /></svg>
            </div>
            <div class="symbol symbol-o">
              <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="32" /></svg>
            </div>
          </div>

          <!-- Cell 9 -->
          <div class="cell cell-9">
            <label for="x9" class="lbl-x" title="Play X"></label>
            <label for="o9" class="lbl-o" title="Play O"></label>
            <div class="symbol symbol-x">
              <svg viewBox="0 0 100 100"><path d="M 20 20 L 80 80 M 80 20 L 20 80" /></svg>
            </div>
            <div class="symbol symbol-o">
              <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="32" /></svg>
            </div>
          </div>

          <!-- Winning Strike Lines -->
          <div class="strike-line strike-row-1"></div>
          <div class="strike-line strike-row-2"></div>
          <div class="strike-line strike-row-3"></div>
          <div class="strike-line strike-col-1"></div>
          <div class="strike-line strike-col-2"></div>
          <div class="strike-line strike-col-3"></div>
          <div class="strike-line strike-diag-1"></div>
          <div class="strike-line strike-diag-2"></div>
        </div>
      </div>

      <!-- Action Footer -->
      <footer class="action-footer">
        <button type="reset" class="action-btn primary-btn">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 4v6h-6"></path>
            <path d="M1 20v-6h6"></path>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
          Reset Game
        </button>
      </footer>
    </main>
  </form>
</body>
</html>
